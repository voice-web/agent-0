services:
  default-html:
    image: "local/default-html:0.0.2"
    environment:
      BASIC_HTTP_ROOT: "/srv/www"
      PORT: "8080"
    volumes:
      - "${GLOBE_LANDING_ASSETS}:/srv/www/assets:ro"
    networks:
      - wc-net
    restart: unless-stopped

  default-api-json:
    image: "local/default-api-json:0.0.1"
    environment:
      PORT: "8080"
      # Local is path-routed behind the same origin; allow '*' as a safe baseline.
      CORS_ALLOW_ORIGINS: "*"
    networks:
      - wc-net
    restart: unless-stopped

  globe-landing:
    image: "local/globe-landing:0.0.1"
    environment:
      PORT: "8080"
    networks:
      - wc-net
    restart: unless-stopped

networks:
  wc-net:
    external: true
    name: "wc-127-0-0-1-net"

