services:
  caddy:
    image: "local/caddy:2.8.4"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "${CADDYFILE_PATH:-../examples/routing/Caddyfile-oci-vm}:/etc/caddy/Caddyfile:ro"
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - keycloak
    networks:
      - wc-net
    restart: unless-stopped

  keycloak:
    image: "local/keycloak:26.0.5"
    command: ["start-dev"]
    env_file:
      - "${KEYCLOAK_ENV_FILE:-${HOME}/.secrets/worldcliques/oci-vm/keycloak.env}"
    environment:
      KC_PROXY: "edge"
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_HOSTNAME: "auth.worldcliques.org"
      KC_HOSTNAME_STRICT: "false"
    networks:
      - wc-net
    restart: unless-stopped

networks:
  wc-net:
    name: "wc-oci-vm-net"
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
