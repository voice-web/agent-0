# Open WebUI → Ollama on the host. POC via `docker compose up -d` (same idea as vap/local-gateway-v1).
#
# macOS: OrbStack (recommended) or Docker Desktop — keep the app running; `host.docker.internal` → host.
# Windows: Docker Desktop — same compose file pattern.
# Linux: host.docker.internal may be missing — see README.md Part 2 (host network or 172.17.0.1).
#
# Prerequisite: Ollama listening on the host at port 11434 (not inside this stack).

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui:
