# Open WebUI → Ollama on the Docker host (macOS / Windows Docker Desktop).
# Requires Ollama running on the host at port 11434.
# Linux: see README — you may need --network host or OLLAMA_BASE_URL=http://172.17.0.1:11434 instead.

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui:
