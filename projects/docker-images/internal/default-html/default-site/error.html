<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Worldcliques Error</title>
    <meta name="description" content="Error page" />

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/default-icon-32.png" />
    <link rel="icon" type="image/png" href="assets/images/default-icon.png" />

    <style>
      /* Center the error message in a small white box, matching the login box aesthetic. */
      .error-box {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(430px, calc(100vw - 2rem));
        padding: 0.9rem;
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: 16px;
        background: rgba(246, 250, 255, 0.92);
        color: #24354d;
        backdrop-filter: blur(10px);
        box-shadow:
          0 10px 36px rgba(8, 20, 48, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
        z-index: 10;
        text-align: center;
      }
      .error-box p {
        margin: 0.35rem 0 0;
        color: #31496a;
        font-weight: 600;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <!-- Keep globe + starfield so the background matches globe-landing style. -->
    <main class="stage" aria-label="Starfield">
      <div class="globe" role="img" aria-label="3D globe background"></div>
    </main>

    <div class="error-box">
      <h2 style="margin: 0; font-size: 1.1rem; letter-spacing: 0.2px">Something went wrong</h2>
      <p>Try again in a moment.</p>
    </div>

    <script type="module" src="js/globe.js"></script>
  </body>
</html>
