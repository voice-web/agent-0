<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Worldcliques</title>
    <meta name="description" content="Rotating Earth landing" />

    <!-- This container serves /srv/www. When using this image in compose, mount globe-landing assets. -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/default-icon-32.png" />
    <link rel="icon" type="image/png" href="assets/images/default-icon.png" />

    <!-- Three.js ESM (pinned); globe logic in js/globe.js (from globe-landing). -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="stage" aria-label="Rotating Earth">
      <div class="globe" role="img" aria-label="3D globe" aria-hidden="true"></div>
    </main>

    <script type="module" src="js/globe.js"></script>
  </body>
</html>
